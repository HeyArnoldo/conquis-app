version: '3.8'

services:
  # MongoDB for NestJS backend
  mongo-conquis:
    image: mongo:7
    container_name: conquis-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: conquis_dev
    volumes:
      - conquis-mongo-data:/data/db
    networks:
      - conquis-network

  # MinIO (S3-compatible) for file storage
  minio-conquis:
    image: minio/minio:latest
    container_name: conquis-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - conquis-minio-data:/data
    networks:
      - conquis-network

  # Legacy PostgreSQL (kept for reference, not used by CEP)
  # postgres-conquis:
  #   image: pgvector/pgvector:pg16
  #   container_name: conquis-postgres
  #   ports:
  #     - "5433:5432"
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgrespassword
  #     POSTGRES_DB: conquis_dev
  #   volumes:
  #     - ./postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - conquis-network

volumes:
  conquis-mongo-data:
  conquis-minio-data:

networks:
  conquis-network:
    driver: bridge
